version: "3.9"

services:
  api:
    build: .
    container_name: mf_ai_agent_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  frontend:
    build: .
    container_name: mf_ai_agent_frontend
    command: streamlit run frontend/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - api
    volumes:
      - .:/app

  db:
    image: postgres:15
    container_name: mf_ai_postgres
    environment:
      POSTGRES_DB: mf_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: mf_ai_redis
    ports:
      - "6379:6379"
